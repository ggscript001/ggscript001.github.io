<!DOCTYPE html>
<html>
<head>
  <style>
    .page{display:none;text-align:center;margin:8px auto;max-width:360px;}
    .biku{border:2px solid #000;border-radius:10px;padding:12px;margin:8px;cursor:pointer;}
    #page3{height:300px;overflow:auto;border:1px solid #333;border-radius:8px;}
    #page6{width:90%;height:60px;box-sizing:border-box;}
  </style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="page" id="page-3" onclick="fys(1,2)">返回好友栏</div>
  <input type="text" placeholder="输入好友编号" class="page biku" id="page-1">
  <div class="page biku" id="page0" onclick="sshy()">搜索好友</div>
  <div class="page" id="page-2"></div>

  <div class="page biku" id="page1">🐦Birdie<hr>
    <div onclick="fys(-1,0,-2,-3)" class="biku">打开搜索</div>
  </div>
  <div class="page" id="page2"></div>

  <textarea class="page biku" id="page6" placeholder="输入消息"></textarea>
  <div class="page biku" id="page5" onclick="fsdx()">发送</div>
  <div class="page biku" id="page4" onclick="fys(1,2)">返回</div>
  <div class="page" id="page3"></div>

  <script>
    const { createClient } = supabase;
    const sgk = createClient(
      "https://tyznbeynnxkweewgnour.supabase.co",
      "sb_publishable_IJ0ix_g7nAV_Nj9anibe9Q_w4gg0SBZ"
    );

    let myId;
    let userName;
    let currentChat;

    async function getSugk() {
      const { data } = await sgk.from('sugk').select('*');
      return data || [];
    }

    async function initSysCount() {
      const data = await getSugk();
      if (!data.some(i => i.name === "系统计数")) {
        await sgk.from('sugk').insert([{ name: "系统计数", number: 0 }]);
      }
    }

    async function getNewUserId() {
      const data = await getSugk();
      const sys = data.find(i => i.name === "系统计数");
      const current = Number(sys.number) || 0;
      const next = current + 1;
      await sgk.from('sugk').update({ number: next }).eq('name', '系统计数');
      return next;
    }

    // 登录逻辑
    async function login() {
      await initSysCount();
      const localId = localStorage.getItem('myId');
      const data = await getSugk();

      const userExist = data.some(
        i => i.name.startsWith('用户') && Number(i.number) == Number(localId)
      );

      if (localId && userExist) {
        myId = Number(localId);
        userName = `用户${myId}`;
        loadChatList();
        return;
      }

      const newId = await getNewUserId();
      myId = newId;
      userName = `用户${myId}`;
      localStorage.setItem('myId', myId);
      await sgk.from('sugk').insert([{ name: userName, number: myId }]);
      loadChatList();
    }

    // 搜索好友
    async function sshy() {
      const kw = document.getElementById('page-1').value.trim();
      const box = document.getElementById('page-2');
      box.innerHTML = '';
      if (!kw) return;
      const data = await getSugk();
      const target = data.find(u =>
        u.name.startsWith('用户') &&
        Number(u.number) == kw &&
        Number(u.number) != myId
      );
      if (target) box.innerHTML = `<div class="biku" onclick="tjhy(${target.number})">添加${target.name}</div>`;
    }

    // 【核心修复】添加好友：严格查重，禁止重复建群
    async function tjhy(targetId) {
      targetId = Number(targetId);
      const sorted = [myId, targetId].sort((a, b) => a - b);
      const chatId = JSON.stringify(sorted);
      const data = await getSugk();

      // 精确判断该聊天是否已存在
      const chatExists = data.some(item => 
        item.number === chatId && item.name === "系统"
      );

      if (chatExists) {
        alert('该好友已添加，请勿重复添加');
        fys(1,2);
        return;
      }

      // 不存在才创建
      await sgk.from('sugk').insert([
        { name: "系统", text: "聊天创建成功", number: chatId }
      ]);

      fys(1,2);
      loadChatList();
    }

    // 【修复】加载聊天列表+自动去重
    async function loadChatList() {
      const data = await getSugk();
      const box = document.getElementById('page2');
      box.innerHTML = '';

      // 用来存已经加过的聊天ID，防止重复
      const addedChatIds = new Set();

      for (const item of data) {
        try {
          const arr = JSON.parse(item.number);
          if (Array.isArray(arr) && arr.includes(myId)) {
            const chatId = item.number;
            if (addedChatIds.has(chatId)) continue;
            addedChatIds.add(chatId);
            box.innerHTML += `<div class="biku" onclick="ltkdq('${chatId}')">聊天${chatId}</div>`;
          }
        } catch (e) {}
      }
    }

    // 打开聊天
    async function ltkdq(chatId) {
      currentChat = chatId;
      const data = await getSugk();
      const box = document.getElementById('page3');
      box.innerHTML = '';
      for (const item of data) {
        if (item.number === chatId && item.text) {
          box.innerHTML += `<div class="biku">${item.name}：${item.text}</div>`;
        }
      }
      fys(3,4,5,6);
      box.scrollTop = box.scrollHeight;
    }

    // 发送消息
    async function fsdx() {
      const txt = document.getElementById('page6').value.trim();
      if (!txt || !currentChat) return;
      await sgk.from('sugk').insert([
        { name: userName, text: txt, number: currentChat }
      ]);
      ltkdq(currentChat);
      document.getElementById('page6').value = '';
    }

    // 页面切换
    function fys(...list) {
      document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
      list.forEach(n => {
        const el = document.getElementById(`page${n}`);
        if (el) el.style.display = 'block';
      });
    }

    fys(1,2);
    login();
  </script>
</body>
</html>
