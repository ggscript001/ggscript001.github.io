<!DOCTYPE html>
<html>
<head>
  <style>
    .page{display:none;text-align:center;margin:8px auto;max-width:380px;}
    .biku{border:2px solid #000;border-radius:10px;padding:12px;margin:8px;display:flex;justify-content:space-between;align-items:center;}
    #page3{height:300px;overflow:auto;border:1px solid #333;border-radius:8px;text-align:left;padding:8px;}
    #page-1{width:90%;box-sizing:border-box;}
    #page6{width:90%;height:60px;box-sizing:border-box;}
    .join-btn{background:#000;color:#fff;padding:4px 8px;border-radius:6px;cursor:pointer;}
  </style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="page" id="page-3" onclick="fys(1,2)">返回好友栏</div>
  <input type="text" placeholder="搜索用户/群聊关键词" class="page biku" id="page-1">
  <div class="page biku" id="page0" onclick="doSearch()">搜索</div>
  <div class="page" id="page-2"></div>

  <div class="page biku" id="page1">
    🐦Birdie
    <hr>
    <div onclick="fys(-1,0,-2,-3)" class="biku">打开搜索</div>
  </div>
  <div class="page" id="page2"></div>

  <textarea class="page biku" id="page6" placeholder="输入消息"></textarea>
  <div class="page biku" id="page5" onclick="sendMsg()">发送</div>
  <div class="page biku" id="page4" onclick="fys(1,2)">返回</div>
  <div class="page" id="page3"></div>

  <script>
    const { createClient } = supabase;
    const sgk = createClient(
      "https://tyznbeynnxkweewgnour.supabase.co",
      "sb_publishable_IJ0ix_g7nAV_Nj9anibe9q_w4gg0SBZ"
    );

    let myId = null;
    let userName = "";
    let currentChat = "";

    // 统一查询
    async function getDB(columns) {
      try {
        const { data } = await sgk.from('sugk').select(columns);
        return data || [];
      } catch (e) { return [] }
    }

    // 初始化系统计数器
    async function initCounter() {
      const data = await getDB('name,number');
      const counter = data.find(i => i.name === "系统计数");
      if (!counter) {
        await sgk.from('sugk').insert([{ name:"系统计数", number:0 }]);
      }
    }

    // 🔥 修复核心：原子化生成ID，彻底杜绝两人同号
    async function getNewId() {
      await initCounter();
      // 循环查询+更新，直到更新成功，避免并发重复
      while(true) {
        const { data } = await sgk.from('sugk').select('number').eq('name','系统计数').single();
        const currentNum = Number(data.number) || 0;
        const newId = currentNum + 1;
        // 只有当前number没变才更新成功，否则重试
        const { error } = await sgk.from('sugk')
          .update({number:newId})
          .eq('name','系统计数')
          .eq('number',currentNum);
        if(!error) return newId;
      }
    }

    // 登录：严格校验本地ID，不存在则新建唯一ID
    async function login() {
      await initCounter();
      const localId = localStorage.getItem('myId');
      const allUsers = await getDB('name,number');
      
      // 本地有ID，校验数据库是否存在
      if(localId) {
        const numId = Number(localId);
        const userExist = allUsers.some(item=>
          item.name.startsWith('用户') && Number(item.number)===numId
        );
        if(userExist) {
          myId = numId;
          userName = `用户${myId}`;
          loadChatList();
          return;
        }
      }

      // 无有效ID，生成唯一新ID
      const newId = await getNewId();
      myId = newId;
      userName = `用户${myId}`;
      localStorage.setItem('myId', myId);
      await sgk.from('sugk').insert([{name:userName, number:myId}]);
      loadChatList();
    }

    // 获取已加入的群
    async function getMyGroups() {
      const data = await getDB('number');
      let groups = [];
      for(let item of data) {
        try {
          const arr = JSON.parse(item.number);
          if(Array.isArray(arr) && arr.includes(myId)) groups.push(item.number);
        }catch(e){}
      }
      return groups;
    }

    // 搜索：模糊匹配，不显示自己/已加群
    async function doSearch() {
      const kw = document.getElementById('page-1').value.trim();
      const box = document.getElementById('page-2');
      box.innerHTML = '';
      if(!kw) return;

      const all = await getDB('name,number');
      const myGroups = await getMyGroups();
      const list = [];

      for(let item of all) {
        const numStr = String(item.number);
        const name = item.name||'';
        // 跳过自己
        if(name.startsWith('用户') && Number(item.number)===myId) continue;
        // 跳过已加入群
        if(myGroups.includes(numStr)) continue;
        // 模糊搜索
        if(name.includes(kw) || numStr.includes(kw)) list.push(item);
      }

      list.forEach(item=>{
        const isUser = item.name.startsWith('用户');
        const type = isUser ? '用户' : '群聊';
        box.innerHTML += `
          <div class="biku">
            <span>${type}：${item.name}(${item.number})</span>
            <div class="join-btn" onclick="joinTarget('${item.number}',${isUser})">加入</div>
          </div>
        `;
      });
    }

    // 加入逻辑：用户创建数组，群追加ID到尾部
    async function joinTarget(targetNum, isUser) {
      if(isUser) {
        // 加用户：创建双人数组
        const arr = [myId, Number(targetNum)];
        const str = JSON.stringify(arr);
        await sgk.from('sugk').insert([{
          name:"创建群聊成功",
          text:"创建群聊成功",
          number:str
        }]);
      } else {
        // 加群：追加自己ID到数组尾部
        const oldArr = JSON.parse(targetNum);
        oldArr.push(myId);
        const newStr = JSON.stringify(oldArr);
        await sgk.from('sugk').update({number:newStr}).eq('number',targetNum);
      }
      // 自动返回好友栏
      fys(1,2);
      loadChatList();
    }

    // 加载聊天列表
    async function loadChatList() {
      const data = await getDB('number,name');
      const box = document.getElementById('page2');
      box.innerHTML = '';
      for(let item of data) {
        try {
          const arr = JSON.parse(item.number);
          if(Array.isArray(arr) && arr.includes(myId)) {
            box.innerHTML += `<div class="biku" onclick="openChat('${item.number}')">${item.name||'群聊'}(${item.number})</div>`;
          }
        }catch(e){}
      }
    }

    // 打开聊天
    async function openChat(chatId) {
      currentChat = chatId;
      const data = await getDB('name,text,number');
      const box = document.getElementById('page3');
      box.innerHTML = '';
      data.forEach(i=>{
        if(i.number===chatId&&i.text) box.innerHTML += `<div class="biku">${i.name}：${i.text}</div>`;
      });
      fys(3,4,5,6);
      box.scrollTop = box.scrollHeight;
    }

    // 发送消息
    async function sendMsg() {
      const t = document.getElementById('page6').value.trim();
      if(!t||!currentChat) return;
      await sgk.from('sugk').insert([{name:userName, text:t, number:currentChat}]);
      openChat(currentChat);
      document.getElementById('page6').value = '';
    }

    // 页面切换
    function fys(...list) {
      document.querySelectorAll('.page').forEach(p=>p.style.display='none');
      list.forEach(n=>{
        const el = document.getElementById(`page${n}`);
        if(el) el.style.display='block';
      });
    }

    // 启动
    fys(1,2);
    login();
  </script>
</body>
</html>
