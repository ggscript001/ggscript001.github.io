<!DOCTYPE html>
<html>
  <head>
    <style>
      .page{
        display:none;
        text-align:center;
      }
      .biku{
        border:2px solid black;
        border-radius:10px;
        padding: 20px;
      }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <div class="page biku" id="page1" style="font-size:55px;width:335px;height:75px;line-height:75px;">🐦Birdie<hr>
    </div>
    <div class="page" id="page2"></div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
  // message: 错误的文字描述（比如 "Cannot read property 'style' of undefined"）
  // source: 哪个文件出的错（比如你的 .html 文件名）
  // lineno: 第几行出错了（最关键！直接告诉你哪一行崩了）
  // colno: 第几列（一般不用管）
  // error: 完整的错误对象

          alert(`
              错误信息：${message}
              出错文件：${source}
              行号：${lineno}
          `);
          return true; // 加了这个，浏览器就不会再偷偷报错了
      };
      const {createClient}=supabase
      const sgk = createClient(
            "https://tyznbeynnxkweewgnour.supabase.co",
            "sb_publishable_g0fn9M0IqZpVocj76y0rPw_IDKxkH2C"
      );
      async function zhdl(){
        let seco = Math.floor(Date.now() / 1000)
        let {data}=await sgk.from('study').select('*')
        data=data||[]
        data.length && data.forEach(v=>{
          let num = parseInt(v.number)
          if (isNaN(num)) v.number=0;
        })
        let lqhc=localStorage.getItem('BianHao')
        //账号如果超过一天未登录将自动注销
        let scs=0
        for (let v=0;data.length>v;v++){
          if (data[v].number==0) continue;
          if (seco-data[v].time>86400){
            await sgk.from('study').delete().eq('number',data[v].number)
          }
          if (data[v].number==lqhc){
            scs=scs+1
          }
        }
        if (lqhc&&(scs==1)){
          //逻辑
        }else{
          let a=0
          for (let v of data){
            if (v.number>a) a=v.number;
          }
          localStorage.setItem('BianHao',a+1)
          await sgk.from('study').insert([{name:"用户"+(a+1),number:a+1,time:seco}])
        }
      }
      function fys(...fyss){
        let a=document.querySelectorAll('.page')
        a.forEach(v=>v.style.display="none")
        fyss.forEach(v=>{
        a[v-1].style.display="block"
        })
      }
      setInterval(async v=>{
        const my=localStorage.getItem('BianHao')
        my && await sgk.from('study').update({time:Math.floor(Date.now() / 1000)}).eq('number',my)
      },1000*60*60*3)
      fys(1,2)
      zhdl()
    </script>
  </body>
</html>
