<!DOCTYPE html>
<html>
  <head>
    <style>
      .page{
        display:none;
        text-align:center;
      }
      .biku{
        border:2px solid black;
        border-radius:10px;
        padding: 20px;
      }
      /* 聊天页样式 */
      #page3{
        height:300px;
        overflow-y:auto;
      }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <div class="page biku" id="page1" style="font-size:55px;width:335px;height:75px;line-height:75px;">🐦Birdie<hr>
    </div>
    <div class="page" id="page2"></div>

    
    <textarea class="page biku" id="page6" placeholder="输入内容"></textarea>
    <div class="page" id="page5" onclick="fsdx()">发送消息</div>
    <div class="page" id="page4" onclick="fys(1,2)">返回好友栏</div>
    <div class="page" id="page3"></div>
    
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
  // message: 错误的文字描述（比如 "Cannot read property 'style' of undefined"）
  // source: 哪个文件出的错（比如你的 .html 文件名）
  // lineno: 第几行出错了（最关键！直接告诉你哪一行崩了）
  // colno: 第几列（一般不用管）
  // error: 完整的错误对象

          alert(`
              错误信息：${message}
              出错文件：${source}
              行号：${lineno}
          `);
          return true; // 加了这个，浏览器就不会再偷偷报错了
      };
      const {createClient}=supabase
      const sgk = createClient(
            "https://tyznbeynnxkweewgnour.supabase.co",
            "sb_publishable_g0fn9M0IqZpVocj76y0rPw_IDKxkH2C"
      );
      let data=[];
      function zifushu(str, char) {
        //超级找字符粑粑
        return (String(str).match(
          new RegExp(
            char.replace(
              /[.*+?^${}|[\]\\]/g, '\\$&'), 
            'g')) || []).length;
      }
      let idname=""//用户名称
      async function fsdx(){
        //发送消息
        await cglj('name,text,number')
        let xiao=document.getElementById('page6')
        if (xiao.value&&xiaoxi){
          try{
            await sgk.from('study').insert([{name:idname,text:xiao.value,number:xiaoxi}])
            await ltkdq(xiaoxi)
            xiao.value=""
          }catch{}
        }
      }
      async function qlhz(){
        //好友栏，添加已加入的群聊仅一次
        await cglj('number')
        let box = document.getElementById('page2')
        let qsg=new Set()
        box.innerHTML=''
        for (let v of data){
          try{
            let qlx=JSON.parse(v.number)
            let qld=v.number
            if (zifushu(qld,localStorage.getItem('BianHao'))){
              if (!qsg.has(qld)){
                qsg.add(qld)
                box.innerHTML+=`<div style="font-size:15px;width:335px;height:20px;line-height:20px;" class="biku" onclick="ltkdq('${qld}')">${qld}</div>`
              }
            }
          }catch{}
        }
      }
      let xiaoxi=""//群聊编号寄存
      async function ltkdq(div){
      //群聊消息加载
        await cglj('name,text,number')
        let wao = document.getElementById('page3')
        wao.innerHTML=''
        for (let v of data){
          try{
            if (v.number===div){
              wao.innerHTML+=`<div style="font-size:15px;width:335px;height:20px;line-height:20px;" class="biku">${v.name}：${v.text}</div>`
            }
          }catch{}
        }
        xiaoxi=div
        fys(3,4,5,6)
      }
      async function qlgc(){
        //检测群聊编号里所有用户的存在，如果用户不存在，就把群聊编号里的不存在的用户的编号删掉
        //正在开发
        await cglj('id,number')
        let yhbh=false
        for (let v of data){
          try{
            //选取群聊
            let jgc=JSON.parse(v.number)
            for (let vb of jgc){
              //遍历选取群聊所有用户编号
              for (let vc of data){
                //将选取的用户编号与数据库的所有用户的编号条件判断是否存在
                try{
                  if (vb===Number(vc.number)){
                    //如果选取的用户编号在数据库里存在，就true表示存在
                    yhbh=true
                    break
                  }
                }catch{}
              }
              //如果选取用户不存在，就把选取群聊的编号里的选取用户的编号删除
              if (yhbh===false){
                //将数组中的选取用户的编号删除
                jgc=jgc.filter(item => item !== vb)
                //删除数据库里的选取群聊里的选取用户的编号
                await sgk.from('study').update({number:JSON.stringify(jgc)}).eq('id',v.id)
              }
              yhbh=false
            }
          }catch{}
        }
      }
      async function hylt(){
      //清除只有一个人的群聊
        await qlgc() //先把所有群聊的编号里的不存在的用户的编号删掉
        await cglj('number')
        for (let v of data){
          let na=v.number
          if (!na) continue;
          let zs=false;
          try{
            zs=Array.isArray(JSON.parse(na))
            na=JSON.parse(na)
            if (zs&&na.length<=1){
              await sgk.from('study').delete().eq('number',JSON.stringify(na))
            }
          }catch{}
        }
      }
      async function cglj(kk){
        //刷新本地存储的数据库信息
        try{
          var res = await sgk.from('study').select(kk)
          data = res.data || []
        }catch{}
      }
      async function zhdl(){
        //账号加减系统
        let seco = Math.floor(Date.now() / 1000)
        await cglj('number,time')
        data.length && data.forEach(v=>{
          let num = parseInt(v.number)
          if (isNaN(num)) v.number="0";
        })
        let lqhc=localStorage.getItem('BianHao')
        //账号如果超过一天未登录将自动注销
        await sgk.from('study').delete().lt('time', seco - 86400)
        if (lqhc&&data.some(v=>v.number==lqhc)){
          //逻辑
          idname="用户"+localStorage.getItem('BianHao')
        }else{
          let a=0
          for (let v of data){
            if (parseInt(v.number)>a) a=parseInt(v.number);
          }
          localStorage.setItem('BianHao',a+1)
          await sgk.from('study').insert([{name:"用户"+(a+1),number:a+1,time:seco}]).catch(err=>console.log("并发冲突，已自动跳过",err))
          idname="用户"+(a+1)
        }
        await hylt()
        await qlhz()
      }
      function fys(...fyss){
        //翻页
      // 先隐藏所有.page
          document.querySelectorAll('.page').forEach(item=>{
              item.style.display="none"
          })
      // 再显示需要的页面
          fyss.forEach(num=>{
              let el = document.getElementById('page'+num)
              if(el) el.style.display="block"
          })
      }
      setInterval(async ()=>{
        //防止傻缺的登录时间超过一天
        const my=localStorage.getItem('BianHao')
        my && await sgk.from('study').update({time:Math.floor(Date.now() / 1000)}).eq('number',my)
      },1000*60*60*3)
      fys(1,2)
      zhdl()
    </script>
  </body>
</html>
