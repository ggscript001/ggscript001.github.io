<!DOCTYPE html>
<html>
<head>
  <style>
    .page{
      display:none;
      text-align:center;
      margin: 8px auto;
      max-width: 360px;
    }
    .biku{
      border:2px solid black;
      border-radius:10px;
      padding: 12px;
      margin: 8px;
    }
    #page3{
      height:300px;
      overflow-y:auto;
      border:1px solid #333;
      border-radius:8px;
    }
    #page6{
      width: 90%;
      height: 60px;
    }
  </style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="page" id="page-3" onclick="fys(1,2)">返回好友栏</div>
  <input type="text" placeholder="请输入好友/群聊编号" class="page biku" id="page-1">
  <div class="page biku" id="page0" onclick="sshy()">搜索好友/群聊</div>
  <div class="page" id="page-2"></div>

  <div class="page biku" id="page1" style="font-size:40px;padding:10px;">
    🐦Birdie
    <hr>
    <div style="font-size:16px;margin-top:10px;" onclick="fys(-1,0,-2,-3)" class="biku">打开搜索</div>
  </div>
  <div class="page" id="page2"></div>

  <textarea class="page biku" id="page6" placeholder="输入内容"></textarea>
  <div class="page biku" id="page5" onclick="fsdx()">发送消息</div>
  <div class="page biku" id="page4" onclick="fys(1,2)">返回好友栏</div>
  <div class="page" id="page3"></div>

  <script>
    const { createClient } = supabase;

    // 你的真实配置
    const sgk = createClient(
      "https://tyznbeynnxkweewgnour.supabase.co/sugk",
      "sb_publishable_IJ0ix_g7nAV_Nj9anibe9Q_w4gg0SBZ"
    );

    let data = [];
    let idname = "";
    let xiaoxi = "";

    // 统计字符数（安全转义）
    function zifushu(str, char) {
      const escapedChar = char.replace(/[.*+?^${}|[\]\\]/g, '\\$&');
      return (String(str).match(new RegExp(escapedChar, 'g')) || []).length;
    }

    // 刷新数据（已改为sugk表）
    async function cglj(kk) {
      try {
        const { data: resData, error } = await sgk.from('sugk').select(kk);
        if (error) {
          console.error("数据库查询错误:", error);
          data = [];
          return;
        }
        data = resData || [];
      } catch (e) {
        console.error("cglj异常:", e);
        data = [];
      }
    }

    // 群聊整理（已改为sugk表）
    async function qlgc() {
      await cglj('id,number');
      const userIds = new Set();
      for (const v of data) {
        const num = Number(v.number);
        if (!isNaN(num)) userIds.add(num);
      }

      for (const v of data) {
        try {
          const jgc = JSON.parse(v.number);
          if (!Array.isArray(jgc)) continue;
          const newArr = jgc.filter(uid => userIds.has(uid));
          if (newArr.length !== jgc.length) {
            await sgk.from('sugk').update({ number: JSON.stringify(newArr) }).eq('id', v.id);
          }
        } catch {}
      }
    }

    // 好友/群聊清理（已改为sugk表）
    async function hylt() {
      await qlgc();
      await cglj('id,number');
      for (const v of data) {
        try {
          const arr = JSON.parse(v.number);
          if (Array.isArray(arr) && arr.length <= 1) {
            await sgk.from('sugk').delete().eq('id', v.id);
          }
        } catch {}
      }
    }

    // 添加好友/进群（已改为sugk表）
    async function tjhy(div) {
      await hylt();
      await cglj('id,number');

      let target = null;
      for (const v of data) {
        if (v.number === div) {
          target = v;
          break;
        }
      }
      if (!target) return;

      fys(1, 2);
      const myId = Number(localStorage.getItem('BianHao'));

      try {
        const arr = JSON.parse(target.number);
        arr.push(myId);
        await sgk.from('sugk').update({ number: JSON.stringify(arr) }).eq('id', target.id);
      } catch {
        const yh = [Number(target.number), myId];
        await sgk.from('sugk').insert([{
          name: "系统",
          text: "创建群聊成功",
          number: JSON.stringify(yh)
        }]);
      }

      await cglj('number');
      await qlhz();
    }

    // 搜索
    async function sshy() {
      const snr = document.getElementById('page-1');
      const sne = document.getElementById('page-2');
      const ka = snr.value.trim();
      sne.innerHTML = '';
      if (!ka) return;

      await cglj('number');
      const myId = localStorage.getItem('BianHao');
      for (const v of data) {
        try {
          const d = v.number;
          if (zifushu(d, ka) > 0 && zifushu(d, myId) === 0) {
            sne.innerHTML += `<div class="biku" onclick="tjhy('${d}')">${d}</div>`;
          }
        } catch {}
      }
    }

    // 发送消息（已改为sugk表）
    async function fsdx() {
      const xiao = document.getElementById('page6');
      const content = xiao.value.trim();

      if (!content || !xiaoxi) return;

      try {
        await sgk.from('sugk').insert([{
          name: idname,
          text: content,
          number: xiaoxi
        }]);
        await ltkdq(xiaoxi);
        xiao.value = "";
      } catch (e) {
        console.error("发送失败:", e);
      }
    }

    // 群列表绘制
    async function qlhz() {
      await cglj('number');
      const box = document.getElementById('page2');
      const qsg = new Set();
      box.innerHTML = '';
      const myId = localStorage.getItem('BianHao');

      for (const v of data) {
        try {
          const qld = v.number;
          JSON.parse(qld);
          if (zifushu(qld, myId)) {
            if (!qsg.has(qld)) {
              qsg.add(qld);
              box.innerHTML += `<div class="biku" onclick="ltkdq('${qld}')">${qld}</div>`;
            }
          }
        } catch {}
      }
    }

    // 聊天窗口
    async function ltkdq(div) {
      await cglj('name,text,number');
      const wao = document.getElementById('page3');
      wao.innerHTML = '';

      for (const v of data) {
        try {
          if (v.number === div) {
            wao.innerHTML += `<div class="biku">${v.name}：${v.text}</div>`;
          }
        } catch {}
      }

      xiaoxi = div;
      fys(3, 4, 5, 6);
      wao.scrollTop = wao.scrollHeight;
    }

    // 登录/注册（已改为sugk表）
    async function zhdl() {
      const seco = Math.floor(Date.now() / 1000);
      await cglj('number,time');

      // 清理过期用户（已改为sugk表）
      await sgk.from('sugk').delete().lt('time', seco - 86400);

      const lqhc = localStorage.getItem('BianHao');
      let exists = false;

      if (lqhc) {
        for (const v of data) {
          if (String(v.number) === String(lqhc)) {
            exists = true;
            break;
          }
        }
      }

      if (exists) {
        idname = "用户" + lqhc;
      } else {
        let maxNum = 0;
        for (const v of data) {
          try {
            const num = parseInt(v.number);
            if (!isNaN(num) && num > maxNum) maxNum = num;
          } catch {}
        }

        const newId = maxNum + 1;
        localStorage.setItem('BianHao', newId);

        await sgk.from('sugk').insert([{
          name: "用户" + newId,
          number: newId,
          time: seco
        }]);

        idname = "用户" + newId;
      }

      await hylt();
      await qlhz();
    }

    // 页面切换
    function fys(...fyss) {
      document.querySelectorAll('.page').forEach(item => {
        item.style.display = "none";
      });
      fyss.forEach(num => {
        const el = document.getElementById('page' + num);
        if (el) el.style.display = "block";
      });
    }

    // 在线心跳（已改为sugk表）
    setInterval(async () => {
      const my = localStorage.getItem('BianHao');
      if (!my) return;
      await sgk.from('sugk').update({
        time: Math.floor(Date.now() / 1000)
      }).eq('number', my);
    }, 1000 * 60 * 60 * 3);

    // 初始化
    fys(1, 2);
    zhdl();
  </script>
</body>
</html>
