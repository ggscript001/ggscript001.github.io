<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: #f0f2f5; color: #1c1e21; }
    .page { display: none; }
    
    /* Login Page */
    #page1 { padding: 40px 20px; max-width: 400px; margin: 0 auto; }
    .login-box { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .login-box h2 { text-align: center; margin-bottom: 30px; color: #1877f2; }
    .login-box h2::before { content: "🐦 "; }
    canvas { border: 2px solid #e4e6eb; border-radius: 8px; margin: 10px auto; display: block; cursor: pointer; background: #f0f2f5; }
    input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #dddfe2; border-radius: 6px; font-size: 16px; }
    button { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 6px; background: #1877f2; color: white; font-size: 16px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #166fe5; }
    .hint { text-align: center; margin-top: 20px; color: #65676b; font-size: 14px; }

    /* Main Interface */
    #page2 { display: none; height: 100vh; }
    .main-container { display: flex; height: 100vh; }
    
    /* Sidebar */
    .sidebar { width: 70px; background: #ffffff; display: flex; flex-direction: column; align-items: center; padding-top: 20px; border-right: 1px solid #e4e6eb; }
    .sidebar-item { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 10px 0; cursor: pointer; color: #65676b; font-size: 20px; transition: background 0.2s; }
    .sidebar-item:hover { background: #f0f2f5; }
    .sidebar-item.active { background: #e7f3ff; color: #1877f2; }
    .user-avatar { width: 50px; height: 50px; border-radius: 50%; margin-bottom: 20px; cursor: pointer; object-fit: cover; border: 2px solid #e4e6eb; }

    /* List Bar */
    .list-bar { width: 280px; background: #ffffff; border-right: 1px solid #e4e6eb; display: flex; flex-direction: column; }
    .list-header { padding: 15px; border-bottom: 1px solid #e4e6eb; display: flex; justify-content: space-between; align-items: center; }
    .list-header h3 { font-size: 18px; font-weight: 600; color: #1c1e21; }
    .list-content { flex: 1; overflow-y: auto; }
    .list-item { padding: 12px 15px; display: flex; align-items: center; cursor: pointer; border-bottom: 1px solid #f0f2f5; transition: background 0.2s; }
    .list-item:hover { background: #f0f2f5; }
    .list-item.active { background: #e7f3ff; }
    .item-avatar { width: 40px; height: 40px; border-radius: 50%; margin-right: 12px; object-fit: cover; }
    .item-info { flex: 1; }
    .item-name { font-weight: 500; margin-bottom: 3px; color: #1c1e21; }
    .item-last-msg { font-size: 12px; color: #65676b; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .badge { background: #f3425f; color: white; font-size: 12px; padding: 2px 6px; border-radius: 10px; min-width: 18px; text-align: center; }

    /* Chat Area */
    .chat-area { flex: 1; display: flex; flex-direction: column; background: #f0f2f5; }
    .chat-header { padding: 15px; border-bottom: 1px solid #e4e6eb; display: flex; justify-content: space-between; align-items: center; background: white; }
    .chat-header h3 { font-size: 18px; font-weight: 600; }
    .chat-messages { flex: 1; padding: 20px; overflow-y: auto; background: #f0f2f5; }
    .message { display: flex; margin: 10px 0; max-width: 70%; }
    .message.self { flex-direction: row-reverse; margin-left: auto; }
    .msg-avatar { width: 40px; height: 40px; border-radius: 50%; margin: 0 10px; object-fit: cover; }
    .msg-content { background: white; padding: 10px 15px; border-radius: 18px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); max-width: 100%; }
    .message.self .msg-content { background: #0084ff; color: white; }
    .msg-time { font-size: 12px; color: #65676b; text-align: center; margin: 15px 0; }
    .chat-input-area { padding: 15px; border-top: 1px solid #e4e6eb; background: white; }
    .input-toolbar { margin-bottom: 10px; display: flex; gap: 10px; }
    .input-toolbar button { width: auto; padding: 5px 10px; margin: 0; background: none; color: #65676b; border: none; font-size: 18px; }
    .input-toolbar button:hover { background: #f0f2f5; }
    .input-box { display: flex; gap: 10px; }
    .input-box input { flex: 1; margin: 0; }
    .input-box button { width: 80px; margin: 0; }

    /* File Preview */
    .file-preview { max-width: 300px; border-radius: 12px; overflow: hidden; margin: 5px 0; }
    .file-preview img, .file-preview video { max-width: 100%; display: block; }
    .file-link { color: inherit; text-decoration: none; }
    .file-icon { display: inline-block; padding: 10px; background: #f0f2f5; border-radius: 8px; margin: 5px 0; }

    /* Search Page */
    #page3 { padding: 20px; }
    .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
    .search-box input { flex: 1; margin: 0; }
    .search-box button { width: 100px; margin: 0; }
    .search-result { background: white; border-radius: 8px; padding: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    .result-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f2f5; }
    .result-item:last-child { border-bottom: none; }
    .result-info { display: flex; align-items: center; gap: 10px; }
    .result-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }

    /* Profile Page */
    #page4 { padding: 20px; max-width: 500px; margin: 0 auto; }
    .profile-card { background: white; border-radius: 12px; padding: 30px; text-align: center; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    .profile-avatar { width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 20px; object-fit: cover; border: 3px solid #e4e6eb; cursor: pointer; }
    .profile-avatar:hover { border-color: #1877f2; }
    .hidden-input { display: none; }
  </style>
</head>
<body>

  <!-- Login Page -->
  <div class="page" id="page1">
    <div class="login-box">
      <h2>Birdie</h2>
      <canvas id="captcha" width="120" height="40"></canvas>
      <input id="captchaInput" placeholder="Enter Captcha">
      <button onclick="register()">Register / Login</button>
      <p class="hint">Complete the captcha to create your account</p>
    </div>
  </div>

  <!-- Main Interface -->
  <div class="page" id="page2">
    <div class="main-container">
      <!-- Sidebar -->
      <div class="sidebar">
        <img class="user-avatar" id="myAvatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=default" onclick="show(4)">
        <div class="sidebar-item active" onclick="switchTab('chat')">💬</div>
        <div class="sidebar-item" onclick="switchTab('friends')">👥</div>
        <div class="sidebar-item" onclick="switchTab('groups')">👨‍👩‍👧‍👦</div>
        <div class="sidebar-item" onclick="show(3)">🔍</div>
        <div class="sidebar-item" onclick="show(4)">⚙️</div>
      </div>

      <!-- List Bar -->
      <div class="list-bar">
        <div class="list-header">
          <h3 id="listTitle">Messages</h3>
          <button onclick="createGroup()" style="width: auto; padding: 5px 10px; font-size: 12px;">Create Group</button>
        </div>
        <div class="list-content" id="listContent"></div>
      </div>

      <!-- Chat Area -->
      <div class="chat-area" id="chatArea">
        <div class="chat-header">
          <h3 id="chatTitle">Select a conversation</h3>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
          <div class="input-toolbar">
            <button onclick="document.getElementById('imageInput').click()">📷</button>
            <button onclick="document.getElementById('videoInput').click()">🎬</button>
            <button onclick="document.getElementById('fileInput').click()">📁</button>
            <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="uploadImage(event)">
            <input type="file" id="videoInput" accept="video/*" style="display: none;" onchange="uploadVideo(event)">
            <input type="file" id="fileInput" style="display: none;" onchange="uploadFile(event)">
          </div>
          <div class="input-box">
            <input id="msgInput" placeholder="Type a message" onkeydown="if(event.key==='Enter')sendMessage()">
            <button onclick="sendMessage()">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Search Page -->
  <div class="page" id="page3">
    <div class="list-header">
      <button onclick="show(2)" style="width: auto; padding: 5px 10px; background: none; color: #1877f2; border: none; font-size: 16px;">← Back</button>
      <h3>Search</h3>
    </div>
    <div class="search-box">
      <input id="searchInput" placeholder="Enter user or group ID">
      <button onclick="search()">Search</button>
    </div>
    <div class="search-result" id="searchResult"></div>
  </div>

  <!-- Profile Page -->
  <div class="page" id="page4">
    <div class="list-header">
      <button onclick="show(2)" style="width: auto; padding: 5px 10px; background: none; color: #1877f2; border: none; font-size: 16px;">← Back</button>
      <h3>Profile</h3>
    </div>
    <div class="profile-card">
      <label for="avatarInput">
        <img class="profile-avatar" id="profileAvatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=default">
      </label>
      <input type="file" id="avatarInput" accept="image/*" class="hidden-input" onchange="uploadAvatar(event)">
      <p>Your ID: <span id="myId"></span></p>
      <input id="profileName" placeholder="Nickname" oninput="updateProfile('name', this.value)">
      <input id="profileSignature" placeholder="Bio" oninput="updateProfile('signature', this.value)">
      <button onclick="logout()" style="background: #f3425f;">Logout</button>
    </div>
  </div>

  <script>
    // Initialize Supabase
    const sb = supabase.createClient(
      "https://tyznbeynnxkweewgnour.supabase.co",
      "sb_publishable_g0fn9M0IqZpVocj76y0rPw_IDKxkH2C"
    );

    let currentUser = null;
    let currentChat = null;
    let currentTab = 'chat';
    let captchaCode = '';
    let messageListener = null;

    // ========== Utility Functions ==========
    function show(pageNum) {
      document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
      document.getElementById('page' + pageNum).style.display = 'block';
      if (messageListener) {
        sb.removeChannel(messageListener);
        messageListener = null;
      }
    }

    // Generate Captcha
    function generateCaptcha() {
      const canvas = document.getElementById('captcha');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      captchaCode = '';
      
      for (let i = 0; i < 4; i++) {
        const c = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ'[Math.floor(Math.random() * 36)];
        captchaCode += c;
        const x = 20 + i * 25;
        const y = 25 + Math.random() * 8;
        const rot = (Math.random() - 0.5) * 0.4;
        
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rot);
        ctx.font = `${20 + Math.random() * 5}px bold Arial`;
        ctx.fillStyle = `rgb(${Math.random()*180},${Math.random()*180},${Math.random()*180})`;
        ctx.fillText(c, 0, 0);
        ctx.restore();
      }
      
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(Math.random()*canvas.width, Math.random()*canvas.height);
        ctx.lineTo(Math.random()*canvas.width, Math.random()*canvas.height);
        ctx.strokeStyle = `rgb(${Math.random()*255},${Math.random()*255},${Math.random()*255})`;
        ctx.stroke();
      }
    }

    // ========== Auth System ==========
    async function register() {
      const input = document.getElementById('captchaInput').value.trim().toUpperCase();
      if (input !== captchaCode) {
        alert('Captcha incorrect');
        generateCaptcha();
        return;
      }

      const { data: users } = await sb.from('users').select('*');
      const userId = (users.length + 1).toString();
      
      const avatar = `https://api.dicebear.com/7.x/avataaars/svg?seed=${userId}`;
      await sb.from('users').insert([{
        user_id: userId,
        name: 'User' + userId,
        avatar,
        online: true
      }]);

      localStorage.setItem('userId', userId);
      currentUser = userId;
      alert('Registration successful! Your ID: ' + userId);
      enterMain();
    }

    async function checkLogin() {
      const userId = localStorage.getItem('userId');
      if (!userId) {
        generateCaptcha();
        show(1);
        return;
      }

      const { data } = await sb.from('users').select('*').eq('user_id', userId).single();
      if (data) {
        currentUser = userId;
        await sb.from('users').update({ online: true, last_login: new Date() }).eq('user_id', userId);
        enterMain();
      } else {
        localStorage.removeItem('userId');
        generateCaptcha();
        show(1);
      }
    }

    function logout() {
      sb.from('users').update({ online: false }).eq('user_id', currentUser);
      localStorage.removeItem('userId');
      currentUser = null;
      generateCaptcha();
      show(1);
    }

    // ========== Main Interface ==========
    async function enterMain() {
      show(2);
      const { data: user } = await sb.from('users').select('*').eq('user_id', currentUser).single();
      document.getElementById('myAvatar').src = user.avatar;
      document.getElementById('profileAvatar').src = user.avatar;
      document.getElementById('myId').textContent = currentUser;
      document.getElementById('profileName').value = user.name;
      document.getElementById('profileSignature').value = user.signature;
      
      loadChatList();
      listenMessages();
      
      window.addEventListener('beforeunload', () => {
        sb.from('users').update({ online: false }).eq('user_id', currentUser);
      });
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.sidebar-item').forEach(item => item.classList.remove('active'));
      event.target.classList.add('active');
      
      switch(tab) {
        case 'chat':
          document.getElementById('listTitle').textContent = 'Messages';
          loadChatList();
          break;
        case 'friends':
          document.getElementById('listTitle').textContent = 'Friends';
          loadFriendList();
          break;
        case 'groups':
          document.getElementById('listTitle').textContent = 'Groups';
          loadGroupList();
          break;
      }
    }

    // ========== Chat List ==========
    async function loadChatList() {
      const list = document.getElementById('listContent');
      list.innerHTML = '';
      
      const { data: friends } = await sb.from('friends').select('*').or(`user1.eq.${currentUser},user2.eq.${currentUser}`).eq('status', 'accepted');
      for (const friend of friends) {
        const friendId = friend.user1 === currentUser ? friend.user2 : friend.user1;
        const { data: user } = await sb.from('users').select('*').eq('user_id', friendId).single();
        
        const chatId = [currentUser, friendId].sort().join('_');
        const { data: messages } = await sb.from('messages').select('*').eq('chat_id', chatId).order('id', { ascending: false }).limit(1);
        
        const div = document.createElement('div');
        div.className = 'list-item';
        div.innerHTML = `
          <img class="item-avatar" src="${user.avatar}">
          <div class="item-info">
            <div class="item-name">${user.name} ${user.online ? '🟢' : ''}</div>
            <div class="item-last-msg">${messages.length > 0 ? getMessagePreview(messages[0]) : 'No messages yet'}</div>
          </div>
        `;
        div.onclick = () => openChat(chatId, user.name, 'private');
        list.appendChild(div);
      }
      
      const { data: groups } = await sb.from('groups').select('*').contains('members', [currentUser]);
      for (const group of groups) {
        const { data: messages } = await sb.from('messages').select('*').eq('chat_id', group.group_id).order('id', { ascending: false }).limit(1);
        
        const div = document.createElement('div');
        div.className = 'list-item';
        div.innerHTML = `
          <img class="item-avatar" src="https://api.dicebear.com/7.x/shapes/svg?seed=${group.group_id}">
          <div class="item-info">
            <div class="item-name">${group.name}</div>
            <div class="item-last-msg">${messages.length > 0 ? getMessagePreview(messages[0]) : 'No messages yet'}</div>
          </div>
        `;
        div.onclick = () => openChat(group.group_id, group.name, 'group');
        list.appendChild(div);
      }
    }

    function getMessagePreview(msg) {
      switch(msg.type) {
        case 'image': return '📷 Photo';
        case 'video': return '🎬 Video';
        case 'file': return '📁 File';
        default: return msg.content;
      }
    }

    // ========== Friend System ==========
    async function loadFriendList() {
      const list = document.getElementById('listContent');
      list.innerHTML = '';
      
      const { data: friends } = await sb.from('friends').select('*').or(`user1.eq.${currentUser},user2.eq.${currentUser}`).eq('status', 'accepted');
      for (const friend of friends) {
        const friendId = friend.user1 === currentUser ? friend.user2 : friend.user1;
        const { data: user } = await sb.from('users').select('*').eq('user_id', friendId).single();
        
        const div = document.createElement('div');
        div.className = 'list-item';
        div.innerHTML = `
          <img class="item-avatar" src="${user.avatar}">
          <div class="item-info">
            <div class="item-name">${user.name} ${user.online ? '🟢 Online' : '⚫ Offline'}</div>
            <div class="item-last-msg">${user.signature}</div>
          </div>
        `;
        div.onclick = () => {
          const chatId = [currentUser, friendId].sort().join('_');
          openChat(chatId, user.name, 'private');
        };
        list.appendChild(div);
      }
      
      const { data: requests } = await sb.from('friends').select('*').eq('user2', currentUser).eq('status', 'pending');
      for (const req of requests) {
        const { data: user } = await sb.from('users').select('*').eq('user_id', req.user1).single();
        
        const div = document.createElement('div');
        div.className = 'list-item';
        div.innerHTML = `
          <img class="item-avatar" src="${user.avatar}">
          <div class="item-info">
            <div class="item-name">${user.name} sent you a friend request</div>
          </div>
          <button onclick="acceptFriend('${req.user1}')" style="width: auto; padding: 5px 10px; font-size: 12px;">Accept</button>
        `;
        list.appendChild(div);
      }
    }

    async function acceptFriend(userId) {
      await sb.from('friends').update({ status: 'accepted' }).eq('user1', userId).eq('user2', currentUser);
      loadFriendList();
      alert('Friend added successfully');
    }

    // ========== Group System ==========
    async function loadGroupList() {
      const list = document.getElementById('listContent');
      list.innerHTML = '';
      
      const { data: groups } = await sb.from('groups').select('*').contains('members', [currentUser]);
      for (const group of groups) {
        const div = document.createElement('div');
        div.className = 'list-item';
        div.innerHTML = `
          <img class="item-avatar" src="https://api.dicebear.com/7.x/shapes/svg?seed=${group.group_id}">
          <div class="item-info">
            <div class="item-name">${group.name}</div>
            <div class="item-last-msg">${group.members.length} members</div>
          </div>
        `;
        div.onclick = () => openChat(group.group_id, group.name, 'group');
        list.appendChild(div);
      }
    }

    async function createGroup() {
      const name = prompt('Enter group name:');
      if (!name) return;
      
      const groupId = 'g' + Date.now();
      await sb.from('groups').insert([{
        group_id: groupId,
        name,
        owner: currentUser,
        members: [currentUser]
      }]);
      
      loadGroupList();
      alert('Group created! Group ID: ' + groupId);
    }

    // ========== Chat Functions ==========
    async function openChat(chatId, title, type) {
      currentChat = { id: chatId, title, type };
      document.getElementById('chatTitle').textContent = title;
      document.getElementById('chatMessages').innerHTML = '';
      
      const { data: messages } = await sb.from('messages').select('*').eq('chat_id', chatId).order('id', { ascending: true });
      for (const msg of messages) {
        addMessage(msg);
      }
      
      if (messageListener) sb.removeChannel(messageListener);
      messageListener = sb.channel('chat-' + chatId)
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `chat_id=eq.${chatId}` }, payload => {
          addMessage(payload.new);
        })
        .subscribe();
    }

    function addMessage(msg) {
      const div = document.createElement('div');
      div.className = `message ${msg.sender_id === currentUser ? 'self' : 'other'}`;
      
      let contentHTML = '';
      switch(msg.type) {
        case 'image':
          contentHTML = `<div class="file-preview"><img src="${msg.file_url}" alt="Photo"></div>`;
          break;
        case 'video':
          contentHTML = `<div class="file-preview"><video src="${msg.file_url}" controls></video></div>`;
          break;
        case 'file':
          contentHTML = `<a href="${msg.file_url}" target="_blank" class="file-link"><div class="file-icon">📁 ${msg.content}</div></a>`;
          break;
        default:
          contentHTML = msg.content;
      }
      
      div.innerHTML = `
        <img class="msg-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=${msg.sender_id}">
        <div class="msg-content">
          ${msg.sender_id !== currentUser ? `<div style="font-size: 12px; color: #65676b; margin-bottom: 3px;">${msg.sender_name}</div>` : ''}
          ${contentHTML}
        </div>
      `;
      document.getElementById('chatMessages').appendChild(div);
      document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('msgInput');
      const content = input.value.trim();
      if (!content || !currentChat) return;
      
      const { data: user } = await sb.from('users').select('name').eq('user_id', currentUser).single();
      await sb.from('messages').insert([{
        chat_id: currentChat.id,
        sender_id: currentUser,
        sender_name: user.name,
        content,
        type: 'text'
      }]);
      
      input.value = '';
    }

    // ========== File Upload Functions ==========
    async function uploadAvatar(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      const fileExt = file.name.split('.').pop();
      const filePath = `avatars/${currentUser}.${fileExt}`;
      
      const { error } = await sb.storage.from('birdie-files').upload(filePath, file, { upsert: true });
      if (error) {
        alert('Upload failed: ' + error.message);
        return;
      }
      
      const { data: urlData } = sb.storage.from('birdie-files').getPublicUrl(filePath);
      const avatarUrl = urlData.publicUrl;
      
      await sb.from('users').update({ avatar: avatarUrl }).eq('user_id', currentUser);
      document.getElementById('myAvatar').src = avatarUrl;
      document.getElementById('profileAvatar').src = avatarUrl;
      alert('Avatar updated successfully!');
    }

    async function uploadImage(event) {
      const file = event.target.files[0];
      if (!file || !currentChat) return;

      const { error } = await sb.storage.from('birdie-files').upload(filePath, file);
      if (error) {
        alert('Upload failed: ' + error.message);
        return;
      }
      
      const { data: urlData } = sb.storage.from('birdie-files').getPublicUrl(filePath);
      
      await sb.from('messages').insert([{
        chat_id: currentChat.id,
        sender_id: currentUser,
        sender_name: user.name,
        content: file.name,
        type: 'image',
        file_url: urlData.publicUrl
      }]);
      
      event.target.value = '';
    }

    function listenMessages() {
      sb.channel('global-messages')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => {
          if (currentTab === 'chat') loadChatList();

    // ========== Search Functions ==========
    async function search() {
      const keyword = document.getElementById('searchInput').value.trim();
      if (!keyword) return;
      
      const result = document.getElementById('searchResult');
      result.innerHTML = '';
      
      const { data: users } = await sb.from('users').select('*').like('user_id', `%${keyword}%`);
      for (const user of users) {
        if (user.user_id === currentUser) continue;
        
        const { data: friends } = await sb.from('friends').select('*').or(`and(user1.eq.${currentUser},user2.eq.${user.user_id}),and(user1.eq.${user.user_id},user2.eq.${currentUser})`);
        
        const div = document.createElement('div');
        div.className = 'result-item';
        div.innerHTML = `
          <div class="result-info">
            <img class="result-avatar" src="${user.avatar}">
            <div>
              <strong>${user.name}</strong>
              <p>ID: ${user.user_id}</p>
            </div>
          </div>
          ${friends.length > 0 ? '<span>Friends</span>' : `<button onclick="addFriend('${user.user_id}')" style="width: auto; padding: 5px 10px;">Add Friend</button>`}
        `;
        result.appendChild(div);
      }
      
      const { data: groups } = await sb.from('groups').select('*').like('group_id', `%${keyword}%`);
      for (const group of groups) {
        const isMember = group.members.includes(currentUser);
        
        const div = document.createElement('div');
        div.className = 'result-item';
        div.innerHTML = `
          <div class="result-info">
            <img class="result-avatar" src="https://api.dicebear.com/7.x/shapes/svg?seed=${group.group_id}">
            <div>
              <strong>${group.name}</strong>
              <p>ID: ${group.group_id}</p>
            </div>
          </div>
          ${isMember ? '<span>Joined</span>' : `<button onclick="joinGroup('${group.group_id}')" style="width: auto; padding: 5px 10px;">Join Group</button>`}
        `;
        result.appendChild(div);
      }
    }

    async function addFriend(userId) {
      await sb.from('friends').insert([{ user1: currentUser, user2: userId }]);
      alert('Friend request sent!');
    }

    async function joinGroup(groupId) {
      const { data: group } = await sb.from('groups').select('*').eq('group_id', groupId).single();
      const newMembers = [...group.members, currentUser];
      await sb.from('groups').update({ members: newMembers }).eq('group_id', groupId);
      alert('Joined group successfully!');
      show(2);
      switchTab('groups');
    }

    // ========== Profile Functions ==========
    async function updateProfile(field, value) {
      await sb.from('users').update({ [field]: value }).eq('user_id', currentUser);
    }

    // Initialize
    document.getElementById('captcha').onclick = generateCaptcha;
    checkLogin();
