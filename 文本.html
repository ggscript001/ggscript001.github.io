<!DOCTYPE html>
<html>
<head>
    <title>小鸟论坛</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>
    <div style="font-size: 30px; text-align: center; margin: 10px 0;">🐦小鸟论坛</div>
    <hr>

    <div id="lk" style="margin-bottom: 120px;"></div>

    <div style="position: fixed; bottom: 0; background: white; width: 100%; padding: 10px; box-sizing: border-box;">
        <input id="mz" maxlength="10" placeholder="输入名字" style="width: 100%; padding: 6px; margin-bottom: 5px;">
        <textarea id="sr" maxlength="200" placeholder="输入消息..." style="width: 100%; height: 50px; padding: 6px;"></textarea>
        
        <div style="display: flex; gap: 5px; margin-top: 5px;">
            <input type="file" id="file" style="flex: 1;">
            <button onclick="fsxx()" style="padding: 6px 12px;">发送</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const sgk = supabase.createClient(
            "https://tyznbeynnxkweewgnour.supabase.co",
            "sb_publishable_g0fn9M0IqZpVocj76y0rPw_IDKxkH2C"
        );

        // 格式化时间
        function fmt(t) {
            let d = new Date(t);
            return d.getFullYear() + "-" +
                String(d.getMonth() + 1).padStart(2, '0') + "-" +
                String(d.getDate()).padStart(2, '0') + " " +
                String(d.getHours()).padStart(2, '0') + ":" +
                String(d.getMinutes()).padStart(2, '0');
        }

        // 发送消息（文字+文件）
        async function fsxx() {
            let name = document.getElementById("mz").value.trim();
            let msg = document.getElementById("sr").value.trim();
            let fileInp = document.getElementById("file");
            let file = fileInp.files[0];

            if (!name) return alert("请输入名字");
            if (!msg && !file) return alert("请输入消息或选择文件");

            let file_url = null;
            let file_name = null;
            let file_type = null;

            if (file) {
                let file_id = crypto.randomUUID();
                let ext = file.name.split(".").pop();
                let path = `${file_id}.${ext}`;

                // 上传到 supabase storage
                let { data: up } = await sgk.storage
                    .from("files")
                    .upload(path, file);

                if (up) {
                    let { data } = sgk.storage.from("files").getPublicUrl(up.path);
                    file_url = data.publicUrl;
                    file_name = file.name;
                    file_type = file.type;
                }
            }

            // 插入消息
            await sgk.from("posts").insert([{
                username: name,
                content: msg,
                file_url,
                file_name,
                file_type,
                created_at: new Date().toISOString()
            }]);

            document.getElementById("sr").value = "";
            fileInp.value = "";
            loadMessages();
        }

        // 实时监听
        sgk.channel('posts-channel')
            .on('postgres_changes', {
                event: 'INSERT',
                schema: 'public',
                table: 'posts'
            }, () => loadMessages())
            .subscribe();

        // 加载 + 自动清理旧消息（连带删文件）
        async function loadMessages() {
            let { data } = await sgk
                .from("posts")
                .select("*")
                .order("id", { ascending: false });

            // 超过30条，删除最早的，连带删文件
            if (data.length > 30) {
                let over = data.length - 30;
                let { data: old } = await sgk
                    .from("posts")
                    .select("id, file_url")
                    .order("id", { ascending: true })
                    .limit(over);

                // 删除文件
                for (let item of old) {
                    if (item.file_url) {
                        let path = item.file_url.split("/files/")[1];
                        if (path) await sgk.storage.from("files").remove([path]);
                    }
                }

                // 删除消息
                let ids = old.map(x => x.id);
                await sgk.from("posts").delete().in("id", ids);

                // 重新加载
                ({ data } = await sgk.from("posts").select("*").order("id", { ascending: false }));
            }

            let box = document.getElementById("lk");
            box.innerHTML = "";

            data.forEach(item => {
                let d = document.createElement("div");
                d.style.border = "2px solid #000";
                d.style.borderRadius = "10px";
                d.style.padding = "8px";
                d.style.margin = "6px";

                // 头部：用户名 + 时间
                let head = document.createElement("div");
                head.style.fontSize = "12px";
                head.style.color = "#666";
                head.textContent = `${item.username} · ${fmt(item.created_at)}`;
                d.appendChild(head);

                // 文字内容
                if (item.content) {
                    let ct = document.createElement("div");
                    ct.style.margin = "4px 0";
                    ct.textContent = item.content;
                    d.appendChild(ct);
                }

                // 文件
                if (item.file_url) {
                    let isImage = item.file_type?.startsWith("image/");

                    if (isImage) {
                        let img = document.createElement("img");
                        img.src = item.file_url;
                        img.style.maxWidth = "100%";
                        img.style.borderRadius = "6px";
                        img.style.marginTop = "4px";
                        d.appendChild(img);
                    } else {
                        let fileBox = document.createElement("div");
                        fileBox.style.margin = "4px 0";
                        fileBox.style.display = "flex";
                        fileBox.style.justifyContent = "space-between";
                        fileBox.style.alignItems = "center";
                        
                        let name = document.createElement("span");
                        name.textContent = "📎 " + item.file_name;
                        fileBox.appendChild(name);

                        let dl = document.createElement("a");
                        dl.href = item.file_url;
                        dl.download = item.file_name;
                        dl.textContent = "下载";
                        dl.style.padding = "4px 8px";
                        dl.style.backgroundColor = "#000";
                        dl.style.color = "#fff";
                        dl.style.borderRadius = "6px";
                        dl.style.textDecoration = "none";
                        fileBox.appendChild(dl);
                        
                        d.appendChild(fileBox);
                    }
                }

                box.appendChild(d);
            });
        }

        // 初始加载
        loadMessages();
    </script>
</body>
</html>
