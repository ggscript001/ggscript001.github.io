<!DOCTYPE html>
<html>
<head>
    <title>Forum</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #000;
            color: #fff;
            padding-bottom: 140px;
        }
        #lk {
            padding: 10px;
        }
        video, img {
            max-width: 100%;
            border-radius: 6px;
        }
        .send-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111;
            padding: 10px;
            z-index: 999;
        }
        input, textarea {
            width: 100%;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 8px;
            margin-bottom: 8px;
        }
        .file-row {
            display: flex;
            gap: 8px;
        }
        #file { flex:1; }
        .send-btn {
            padding: 8px 16px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 6px;
        }
        .post-item {
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            margin: 8px 0;
        }
        .post-header {
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>

<div style="text-align:center; padding:10px; font-size:24px;">🐦 Birdie Forum</div>
<div id="lk"></div>

<div class="send-bar">
    <input id="mz" placeholder="Name">
    <textarea id="sr" placeholder="Message"></textarea>
    <div class="file-row">
        <input type="file" id="file">
        <button class="send-btn" onclick="send()">Send</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sup = supabase.createClient(
    "https://tyznbeynnxkweewgnour.supabase.co",
    "sb_publishable_g0fn9M0IqZpVocj76y0rPw_IDKxkH2C"
);

function time(t) {
    let d = new Date(t);
    return d.toLocaleString();
}

async function send() {
    let name = document.getElementById("mz").value.trim();
    let text = document.getElementById("sr").value.trim();
    let file = document.getElementById("file").files[0];
    if (!name || (!text && !file)) return;

    let url = null, name2 = null, type = null;
    if (file) {
        let id = crypto.randomUUID();
        let ext = file.name.split('.').pop();
        let { data, error } = await sup.storage.from("files").upload(id + "." + ext, file);
        if (!error) {
            let u = sup.storage.from("files").getPublicUrl(data.path);
            url = u.data.publicUrl;
            name2 = file.name;
            type = file.type;
        }
    }

    await sup.from("posts").insert([{
        username: name,
        content: text,
        file_url: url,
        file_name: name2,
        file_type: type
    }]);

    document.getElementById("sr").value = "";
    document.getElementById("file").value = "";
}

function load() {
    sup.from("posts").select("*").order("id", { ascending: false }).then(res => {
        let box = document.getElementById("lk");
        box.innerHTML = "";
        res.data.forEach(p => {
            let d = document.createElement("div");
            d.className = "post-item";

            let h = document.createElement("div");
            h.className = "post-header";
            h.textContent = p.username + " • " + time(p.created_at);
            d.appendChild(h);

            if (p.content) {
                let t = document.createElement("div");
                t.textContent = p.content;
                d.appendChild(t);
            }

            if (p.file_url) {
                if (p.file_type?.startsWith("image/")) {
                    let img = document.createElement("img");
                    img.src = p.file_url;
                    d.appendChild(img);
                } else if (p.file_type?.startsWith("video/")) {
                    let v = document.createElement("video");
                    v.src = p.file_url;
                    v.controls = true;
                    v.style.width = "100%";
                    v.setAttribute("playsinline", "true");
                    d.appendChild(v);
                }
            }
            box.appendChild(d);
        });
    });
}

sup.channel("x").on("postgres_changes", { event: "*", schema: "public", table: "posts" }, load).subscribe();
load();
</script>
</body>
</html>
