<!DOCTYPE html>
<html>

<head>
    <title>小鸟网站</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>
    <div style="font-size: 35px;border: 2px solid black;border-radius:10px;text-align:center;">🐦小鸟论坛</div>
    <textarea style="width: 250px;height: 30px;border: 2px solid black;border-radius:10px;position: fixed;bottom: 40px; right: 110px;" id="sr" placeholder="请输入文本"></textarea>
    <div style="width: 100px;height: 30px;border: 2px solid black;border-radius:10px;text-align:center;line-height:30px;position: fixed;bottom: 40px; right:0px;" id="fs" onclick="fsxx()">发送消息</div>
    <hr>
    <div id="lk"></div>
    <script>
        function fsxx() {
            let sr=document.getElementById("sr"), lk=document.getElementById("lk");
            let st=sr.value
            let sy=document.createElement("div")
            sy.sytle.width="280px"
            sy.style.height="20px"
            sy.sytle.border="2px solid black;border-radius:10px"
            sy.textContent=st
            lk.appendChild(sy)
            sr.value=""
        }
    </script>
</body>
</html>
