<!DOCTYPE html>
<html>
<head>
    <title>Birdie Forum</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            /* 关键1：给body加足够的底部内边距，永远给发送栏留位置 */
            padding-bottom: 140px;
        }
        #lk {
            min-height: 200px;
            padding: 0 10px;
        }
        img, video {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            /* 关键2：视频永远在下层 */
            position: relative;
            z-index: 1;
        }
        video {
            background: #000;
        }
        /* 关键3：发送栏固定在最底层，层级拉满，永远不被挡 */
        .send-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111;
            padding: 10px;
            border-top: 1px solid #333;
            /* 极致高层级，覆盖所有内容 */
            z-index: 999999 !important;
        }
        input, textarea {
            width: 100%;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 8px;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input::placeholder, textarea::placeholder {
            color: #888;
        }
        .file-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        #file {
            flex: 1;
            padding: 6px;
        }
        .send-btn {
            padding: 8px 20px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        .post-item {
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            margin: 8px 0;
            background: #111;
        }
        .post-header {
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
        }
        .post-content {
            margin: 6px 0;
            line-height: 1.5;
        }
        .file-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            background: #222;
            border-radius: 6px;
            margin-top: 4px;
        }
        .download-btn {
            padding: 4px 10px;
            background: #007bff;
            color: #fff;
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div style="font-size: 30px; text-align: center; margin: 14px 0; font-weight: bold;">🐦 Birdie Forum</div>
    <div style="font-size: 15px; text-align: center; margin: 14px 0; font-weight: bold;">Hypper Sandbox</div>
    <hr style="border-color: #333; margin: 0 10px;">

    <div id="lk"></div>

    <!-- 底部发送栏 -->
    <div class="send-bar">
        <input id="mz" placeholder="Your name" maxlength="16">
        <textarea id="sr" placeholder="Type your message..." maxlength="300" style="height: 60px;"></textarea>
        <div class="file-row">
            <input type="file" id="file">
            <button class="send-btn" onclick="fsxx()">Send</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const sgk = supabase.createClient(
            "https://tyznbeynnxkweewgnour.supabase.co",
            "sb_publishable_g0fn9M0IqZpVocj76y0rPw_IDKxkH2C"
        );

        function fmt(t) {
            let d = new Date(t);
            return d.getFullYear() + "-" +
                String(d.getMonth()+1).padStart(2,'0') + "-" +
                String(d.getDate()).padStart(2,'0') + " " +
                String(d.getHours()).padStart(2,'0') + ":" +
                String(d.getMinutes()).padStart(2,'0');
        }

        async function fsxx() {
            let name = document.getElementById("mz").value.trim();
            let msg = document.getElementById("sr").value.trim();
            let fileInp = document.getElementById("file");
            let file = fileInp.files[0];

            if (!name) { alert("Please enter your name"); return; }
            if (!msg && !file) { alert("Please enter a message or select a file"); return; }

            let file_url = null;
            let file_name = null;
            let file_type = null;

            if (file) {
                let file_id = crypto.randomUUID();
                let ext = file.name.split('.').pop();
                let path = `${file_id}.${ext}`;

                let { data: up, error: upErr } = await sgk.storage
                .from("files")
                .upload(path, file, {
                    cacheControl: '3600',
                    upsert: false,
                    contentType: file.type
                });

                if (upErr) {
                    console.error("Upload error:", upErr);
                    alert(`File upload failed: ${upErr.message}`);
                    return;
                }

                let { data } = sgk.storage.from("files").getPublicUrl(up.path);
                file_url = data.publicUrl;
                file_name = file.name;
                file_type = file.type;
            }

            let { error: insertErr } = await sgk.from("posts").insert([{
                username: name,
                content: msg,
                file_url,
                file_name,
                file_type,
                created_at: new Date().toISOString()
            }]);

            if (insertErr) {
                console.error("Post error:", insertErr);
                alert(`Failed to send: ${insertErr.message}`);
                return;
            }

            document.getElementById("sr").value = "";
            fileInp.value = "";
        }

        function loadMessages() {
            sgk.from('posts')
            .select('*')
            .order('id', { ascending: false })
            .then(res => {
                if (res.error) {
                    console.error("Load error:", res.error);
                    return;
                }

                let box = document.getElementById("lk");
                box.innerHTML = "";

                res.data.forEach(item => {
                    let div = document.createElement("div");
                    div.className = "post-item";

                    let head = document.createElement("div");
                    head.className = "post-header";
                    head.textContent = `${item.username} • ${fmt(item.created_at)}`;
                    div.appendChild(head);

                    if (item.content) {
                        let ct = document.createElement("div");
                        ct.className = "post-content";
                        ct.textContent = item.content;
                        div.appendChild(ct);
                    }

                    if (item.file_url) {
                        const isImage = item.file_type?.startsWith("image/") || /\.(jpg|jpeg|png|gif|webp)$/i.test(item.file_name || "");
                        const isVideo = item.file_type?.startsWith("video/") || /\.(mp4|webm|ogg|mov)$/i.test(item.file_name || "");

                        if (isImage) {
                            let img = document.createElement("img");
                            img.src = item.file_url;
                            img.alt = item.file_name;
                            div.appendChild(img);
                        } else if (isVideo) {
                            let video = document.createElement("video");
                            video.src = item.file_url;
                            video.controls = true;
                            video.preload = "metadata";
                            // 额外防护：禁止视频悬浮层遮挡
                            video.style.zIndex = "1";
                            div.appendChild(video);
                        } else {
                            let fileBox = document.createElement("div");
                            fileBox.className = "file-box";

                            let nameSpan = document.createElement("span");
                            nameSpan.textContent = "📎 " + (item.file_name || "File");
                            fileBox.appendChild(nameSpan);

                            let dl = document.createElement("a");
                            dl.className = "download-btn";
                            dl.href = item.file_url;
                            dl.download = item.file_name || "file";
                            dl.textContent = "Download";
                            fileBox.appendChild(dl);

                            div.appendChild(fileBox);
                        }
                    }

                    box.appendChild(div);
                });
            });
        }

        // 实时监听
        sgk.channel('posts-channel')
        .on('postgres_changes', {
            event: '*',
            schema: 'public',
            table: 'posts'
        }, () => {
            loadMessages();
        })
        .subscribe();

        // 首次加载
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(loadMessages, 300);
        });
    </script>
</body>
</html>
