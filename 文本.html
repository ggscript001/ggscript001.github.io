<!DOCTYPE html>
<html>
<head>
    <title>小鸟网站</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>
    <div style="font-size: 35px;border: 2px solid black;border-radius:10px;text-align:center;">🐦小鸟论坛</div>
    <textarea maxlength="100" style="width: 250px;height: 30px;border: 2px solid black;border-radius:10px;position: fixed;bottom: 40px; right: 110px;" id="sr" placeholder="请输入文本"></textarea>
    <input id="mz" style="position: fixed;bottom: 80px; right:250px;" maxlength="10" type="text" placeholder="请输入名字">
    <div style="width: 100px;height: 30px;border: 2px solid black;border-radius:10px;text-align:center;line-height:30px;position: fixed;bottom: 40px; right:0px;" id="fs" onclick="fsxx()">发送消息</div>
    <hr>
    <div id="lk"></div>
    <script>
        function fsxx() {
            let sr=document.getElementById("sr"), lk=document.getElementById("lk"), mz=document.getElementById("mz").value.trim();
            let sy=document.createElement("div"), st=sr.value.trim();
            sy.style.width="280px"
            sy.style.height="auto"
            sy.style.border="2px solid black"
            sy.style.borderRadius="10px"
            sy.style.wordBreak = "break-all"
            sy.textContent=mz+"："+st
            if (st&&mz){
                lk.appendChild(sy)
            }else{
                console.warn("禁止名字或输入内容空白")
            }
            sr.value=""
        }
    </script>
</body>
</html>
