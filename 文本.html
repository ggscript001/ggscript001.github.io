<!DOCTYPE html>
<html>

<head>
    <title>小鸟网站</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
</head>
<body>
    <div width:"200px" height:"100px">🐦小鸟论坛</div>
    <textarea style="width: 100px;height: 50px;" id="sr" placeholder="请输入文本"></textarea>
    <div style="width: 100px;height: 40px;" id="fs" onclick="fsxx()">发送消息</div>
    <div id="lk"></div>
    <script>
        function fsxx() {
            let sr=document.getElementById("sr"), lk=document.getElementById("lk");
            let st=sr.value
            let sy=document.createElement("div")
            sy.textContent=st
            lk.appendChild(sy)
            sr.value=""
        }
    </script>
</body>
</html>
