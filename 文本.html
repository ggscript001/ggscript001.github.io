<!DOCTYPE html>
<html>
<head>
    <title>Birdie Forum</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: Arial, sans-serif; padding-bottom: 140px; }
        #lk { min-height: 200px; padding: 0 10px; }
        img, video { max-width:100%; height:auto; border-radius:6px; }
        video { background:#000; }
        .send-bar { position:fixed; bottom:0; left:0; right:0; background:#111; padding:10px; border-top:1px solid #333; z-index:9999; }
        input, textarea { width:100%; background:#222; color:#fff; border:1px solid #444; border-radius:6px; padding:8px; margin-bottom:8px; font-size:14px; }
        input::placeholder, textarea::placeholder { color:#888; }
        .file-row { display:flex; gap:8px; align-items:center; }
        #file { flex:1; padding:6px; }
        .send-btn { padding:8px 20px; background:#007bff; color:#fff; border:none; border-radius:6px; font-weight:bold; }
        .post-item { border:1px solid #333; border-radius:8px; padding:10px; margin:8px 0; background:#111; }
        .post-header { font-size:12px; color:#888; margin-bottom:6px; }
        .post-content { margin:6px 0; line-height:1.5; }
        .file-box { display:flex; justify-content:space-between; align-items:center; padding:6px 8px; background:#222; border-radius:6px; margin-top:4px; }
        .download-btn { padding:4px 10px; background:#007bff; color:#fff; border-radius:4px; text-decoration:none; font-size:14px; }
    </style>
</head>
<body>
    <div style="font-size:30px;text-align:center;margin:14px 0;font-weight:bold;">🐦 Birdie Forum</div>
    <div style="font-size:15px;text-align:center;margin:14px 0;">Hypper Sandbox</div>
    <hr style="border-color:#333;margin:0 10px;">

    <div id="lk"></div>

    <div class="send-bar">
        <input id="mz" placeholder="Your name" maxlength="16">
        <textarea id="sr" placeholder="Type your message..." maxlength="300" style="height:60px;"></textarea>
        <div class="file-row">
            <input type="file" id="file">
            <button class="send-btn" onclick="fsxx()">Send</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const sb = supabase.createClient(
            "https://tyznbeynnxkweewgnour.supabase.co",
            "sb_publishable_g0fn9M0IqZpVocj76y0rPw_IDKxkH2C"
        );

        const BUCKET = "files";
        const MAX_POSTS = 50;    // 最多保留50条
        const MAX_STORAGE = 500 * 1024 * 1024;

        // 清理多余帖子（超过50条删旧的）
        async function cleanOldPosts() {
            const { data } = await sb.from("posts")
                .select("id")
                .order("id", { ascending: false });

            if (!data || data.length <= MAX_POSTS) return;

            const toDelete = data.slice(MAX_POSTS).map(x => x.id);
            await sb.from("posts").delete().in("id", toDelete);
        }

        // 存储自动清理
        async function getTotalSize() {
            const { data } = await sb.storage.from(BUCKET).list('', { sortBy: { column: 'created_at', order: 'asc' } });
            return (data || []).reduce((s, f) => s + (f.metadata?.size || 0), 0);
        }

        async function cleanStorage(file) {
            if (!file) return true;
            const total = await getTotalSize();
            const need = total + file.size - MAX_STORAGE;
            if (need <= 0) return true;

            let { data } = await sb.storage.from(BUCKET).list('', { sortBy: { column: 'created_at', order: 'asc' } });
            let rem = need;
            const del = [];
            for (const f of data || []) {
                if (rem <= 0) break;
                del.push(f.name);
                rem -= f.metadata?.size || 0;
            }
            if (del.length) await sb.storage.from(BUCKET).remove(del);
            return true;
        }

        // 上传文件
        async function upload(file) {
            const id = crypto.randomUUID();
            const ext = file.name.split('.').pop();
            const { data, error } = await sb.storage.from(BUCKET).upload(`${id}.${ext}`, file);
            if (error) return null;
            return sb.storage.from(BUCKET).getPublicUrl(data.path).data.publicUrl;
        }

        // 时间格式化
        function fmt(t) {
            const d = new Date(t);
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,0)}-${String(d.getDate()).padStart(2,0)} ${String(d.getHours()).padStart(2,0)}:${String(d.getMinutes()).padStart(2,0)}`;
        }

        // 创建帖子
        function makeItem(p) {
            const div = document.createElement("div");
            div.className = "post-item";
            div.innerHTML = `
                <div class="post-header">${p.username} • ${fmt(p.created_at)}</div>
                ${p.content ? `<div class="post-content">${p.content}</div>` : ''}
            `;
            if (p.file_url) {
                const isImg = /\.(jpg|jpeg|png|gif|webp)$/i.test(p.file_name);
                const isVid = /\.(mp4|webm|mov|ogg)$/i.test(p.file_name);
                if (isImg) div.innerHTML += `<img src="${p.file_url}">`;
                else if (isVid) div.innerHTML += `<video src="${p.file_url}" controls playsinline></video>`;
                else div.innerHTML += `<div class="file-box"><span>📎 ${p.file_name}</span><a class="download-btn" href="${p.file_url}" download>Download</a></div>`;
            }
            return div;
        }

        // 加载
        async function load() {
            const { data } = await sb.from("posts").select("*").order("id", { ascending: false });
            const box = document.getElementById("lk");
            box.innerHTML = "";
            (data || []).forEach(p => box.appendChild(makeItem(p)));
        }

        // 发送
        async function fsxx() {
            const name = document.getElementById("mz").value.trim();
            const content = document.getElementById("sr").value.trim();
            const file = document.getElementById("file").files[0];

            if (!name) return alert("请输入昵称");
            if (!content && !file) return alert("请输入内容或文件");
            if (file && file.size > 50*1024*1024) return alert("文件≤50MB");

            await cleanStorage(file);
            let url = null, fname = null;
            if (file) {
                url = await upload(file);
                fname = file.name;
            }

            // 发帖子
            await sb.from("posts").insert([{ username: name, content, file_url: url, file_name: fname }]);

            // 发完立刻清理到50条以内
            await cleanOldPosts();

            document.getElementById("sr").value = "";
            document.getElementById("file").value = "";
            load();
        }

        // 实时
        document.addEventListener("DOMContentLoaded", () => {
            load();
            sb.channel('c').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'posts' }, () => load()).subscribe();
        });
    </script>
</body>
</html>
