<!DOCTYPE html>
<html>
<head>
    <title>Birdie Forum</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding-bottom: 140px;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        #lk {
            min-height: 200px;
        }
        img, video {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            position: relative;
            z-index: 1;
        }
        video {
            background: #000;
        }
        /* 底部发送栏：极致高层级，普通播放绝对不被挡 */
        .send-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111;
            padding: 10px;
            border-top: 1px solid #333;
            z-index: 99999 !important;
        }
        input, textarea {
            background: #222;
            color: #fff;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 8px;
        }
        input::placeholder, textarea::placeholder {
            color: #888;
        }
    </style>
</head>
<body>

    <div style="font-size: 30px; text-align: center; margin: 10px 0;">🐦 Birdie Forum</div>
    <hr style="border-color: #333;">

    <div id="lk"></div>

    <!-- 底部发送栏 -->
    <div class="send-bar">
        <input id="mz" placeholder="Your name" style="width:100%; margin-bottom:6px;">
        <textarea id="sr" placeholder="Your message..." style="width:100%; height:60px;"></textarea>
        <div style="display:flex; gap:8px; margin-top:6px;">
            <input type="file" id="file" style="flex:1; background:#222; color:#fff; border:1px solid #444; border-radius:6px; padding:6px;">
            <button onclick="fsxx()" style="padding:8px 16px; background:#007bff; color:#fff; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">Send</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const sgk = supabase.createClient(
            "https://tyznbeynnxkweewgnour.supabase.co",
            "sb_publishable_g0fn9M0IqZpVocj76y0rPw_IDKxkH2C"
        );

        function fmt(t) {
            let d = new Date(t);
            return d.getFullYear() + "-" +
                String(d.getMonth()+1).padStart(2,'0') + "-" +
                String(d.getDate()).padStart(2,'0') + " " +
                String(d.getHours()).padStart(2,'0') + ":" +
                String(d.getMinutes()).padStart(2,'0');
        }

        async function fsxx() {
            let name = document.getElementById("mz").value.trim();
            let msg = document.getElementById("sr").value.trim();
            let fileInp = document.getElementById("file");
            let file = fileInp.files[0];

            if (!name) { alert("Please enter your name"); return; }
            if (!msg && !file) { alert("Please enter a message or choose a file"); return; }

            let file_url = null;
            let file_name = null;
            let file_type = null;

            if (file) {
                let file_id = crypto.randomUUID();
                let ext = file.name.split('.').pop();
                let path = file_id + '.' + ext;

                let { data: up, error: upErr } = await sgk.storage
                .from("files")
                .upload(path, file, {
                    cacheControl: '3600',
                    upsert: false
                });

                if (upErr) {
                    console.error(upErr);
                    alert("File upload failed");
                    return;
                }

                let { data } = sgk.storage.from("files").getPublicUrl(up.path);
                file_url = data.publicUrl;
                file_name = file.name;
                file_type = file.type;
            }

            const { error } = await sgk.from('posts').insert([{
                username: name,
                content: msg,
                file_url: file_url,
                file_name: file_name,
                file_type: file_type
            }]);

            if (error) {
                console.error(error);
                alert("Failed to send message");
                return;
            }

            document.getElementById("sr").value = "";
            fileInp.value = "";
        }

        function loadMessages() {
            sgk.from('posts')
            .select('*')
            .order('id', { ascending: false })
            .then(res => {
                let box = document.getElementById("lk");
                box.innerHTML = "";
                res.data.forEach(item => {
                    let div = document.createElement("div");
                    div.style.border = "1px solid #333";
                    div.style.borderRadius = "8px";
                    div.style.padding = "10px";
                    div.style.margin = "8px";
                    div.style.background = "#111";

                    let head = document.createElement("div");
                    head.style.fontSize = "12px";
                    head.style.color = "#888";
                    head.textContent = item.username + " • " + fmt(item.created_at);
                    div.appendChild(head);

                    if (item.content) {
                        let content = document.createElement("div");
                        content.style.margin = "6px 0";
                        content.textContent = item.content;
                        div.appendChild(content);
                    }

                    if (item.file_url) {
                        if (item.file_type?.startsWith("image/")) {
                            let img = document.createElement("img");
                            img.src = item.file_url;
                            img.style.maxWidth = "100%";
                            img.style.borderRadius = "6px";
                            div.appendChild(img);
                        } else if (item.file_type?.startsWith("video/")) {
                            let video = document.createElement("video");
                            video.src = item.file_url;
                            video.controls = true;
                            // 核心修复：禁用全屏，彻底解决遮挡
                            video.controlsList = "nodownload";
                            video.style.maxWidth = "100%";
                            video.style.borderRadius = "6px";
                            // 监听全屏事件，强制退出
                            video.addEventListener('fullscreenchange', () => {
                                if (document.fullscreenElement) {
                                    document.exitFullscreen().catch(err => console.log(err));
                                }
                            });
                            video.addEventListener('webkitfullscreenchange', () => {
                                if (document.webkitFullscreenElement) {
                                    document.webkitExitFullscreen().catch(err => console.log(err));
                                }
                            });
                            div.appendChild(video);
                        } else {
                            let fileWrap = document.createElement("div");
                            fileWrap.style.display = "flex";
                            fileWrap.style.justifyContent = "space-between";
                            fileWrap.style.alignItems = "center";
                            fileWrap.style.padding = "6px";
                            fileWrap.style.backgroundColor = "#222";
                            fileWrap.style.borderRadius = "6px";

                            let nameSpan = document.createElement("span");
                            nameSpan.textContent = "📎 " + item.file_name;

                            let dl = document.createElement("a");
                            dl.href = item.file_url;
                            dl.download = item.file_name;
                            dl.textContent = "Download";
                            dl.style.padding = "4px 10px";
                            dl.style.backgroundColor = "#007bff";
                            dl.style.color = "#fff";
                            dl.style.borderRadius = "4px";
                            dl.style.textDecoration = "none";

                            fileWrap.appendChild(nameSpan);
                            fileWrap.appendChild(dl);
                            div.appendChild(fileWrap);
                        }
                    }

                    box.appendChild(div);
                });
            });
        }

        sgk.channel('*')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, () => {
            loadMessages();
        })
        .subscribe();

        loadMessages();
    </script>
</body>
</html>
